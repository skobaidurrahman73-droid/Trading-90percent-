<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updated Trading Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0d1117; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: white; 
            padding-bottom: 50px;
        }

        /* ১. উপরের স্পন্সর (৭৮০x৭৮০) */
        .top-sponsor { 
            width: 780px; 
            height: 780px; 
            border: 1px solid #30363d; 
            margin: 20px 0; 
            background: #161b22;
        }

        /* ২. মাঝখানের চার্ট (১০৮০x৭২০) */
        .middle-chart { 
            width: 1080px; 
            height: 720px; 
            border: 1px solid #30363d; 
            margin-bottom: 20px;
            background: #131722;
        }

        /* ৩. নিচের সিগন্যাল (১০৮০x৭২০) - আপডেট করা হয়েছে */
        .bottom-signal { 
            width: 1080px; 
            height: 720px; 
            background: #161b22; 
            border: 1px solid #30363d; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
        }

        iframe { width: 100%; height: 100%; border: none; }
        h3 { text-align: center; margin: 15px 0; color: #58a6ff; font-weight: normal; }

        @media (max-width: 1100px) {
            body { align-items: flex-start; padding-left: 10px; }
        }
    </style>
</head>
<body>

    <h3>স্পন্সর অ্যাড (780x780)</h3>
    <div class="top-sponsor">
        <iframe src="https://omg10.com/4/10451492"></iframe>
    </div>

    <h3>লাইভ ক্যান্ডেল চার্ট (1080x720)</h3>
    <div class="middle-chart">
        <div id="tradingview_main" style="height: 100%; width: 100%;"></div>
    </div>

    <h3>মার্কেট সিগন্যাল (1080x720)</h3>
    <div class="bottom-signal">
        <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
            {
                "interval": "1m",
                "width": "100%",
                "isTransparent": true,
                "height": "100%",
                "symbol": "BINANCE:BTCUSDT",
                "showIntervalTabs": true,
                "displayMode": "multiple",
                "locale": "en",
                "colorTheme": "dark",
                "intervals": [
                    "1m",
                    "5m",
                    "15m",
                    "30m"
                ]
            }
            </script>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "width": 1080,
            "height": 720,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "1",
            "timezone": "Asia/Dhaka",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#131722",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_main"
        });
    </script>

</body>
</html>
